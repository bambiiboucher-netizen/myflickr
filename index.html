<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bea's Flickr</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="Bea's Flickr">
<meta property="og:description" content="Artwork • Photography • Second Life">
<meta property="og:type" content="website">

<style>
  body {
    margin: 0;
    height: 100vh;
    background:
      radial-gradient(circle at top, rgba(255,255,255,0.14), transparent 30%),
      linear-gradient(135deg, #08080c, #17111f, #050507);
    color: #f7f1ff;
    font-family: Georgia, "Times New Roman", serif;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .card {
    padding: 42px 34px;
    max-width: 420px;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 24px;
    background: rgba(0,0,0,0.38);
    box-shadow: 0 0 45px rgba(170, 90, 255, 0.18);
    backdrop-filter: blur(8px);
  }

  h1 {
    margin: 0 0 12px;
    font-size: 42px;
    letter-spacing: 1px;
    font-weight: normal;
  }

  p {
    margin: 0 0 28px;
    font-size: 15px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.82;
  }

  a {
    display: inline-block;
    padding: 13px 22px;
    border-radius: 999px;
    color: #fff;
    text-decoration: none;
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    font-family: Arial, sans-serif;
    font-size: 14px;
    letter-spacing: 0.5px;
    box-shadow: 0 0 22px rgba(236,72,153,0.28);
  }

  a:hover {
    transform: translateY(-1px);
    box-shadow: 0 0 30px rgba(236,72,153,0.42);
  }

  .note {
    margin-top: 18px;
    font-family: Arial, sans-serif;
    font-size: 12px;
    opacity: 0.55;
    text-transform: none;
    letter-spacing: 0;
  }
</style>

<script>
  setTimeout(function() {
    window.location.href = "https://www.flickr.com/photos/202234068@N03/albums/72177720333835023/";
  }, 5000);
</script>
</head>

<body>
  <div class="card">
    <h1>Bea's Flickr</h1>
    <p>Artwork • Photography • Second Life</p>

    <a href="https://www.flickr.com/photos/202234068@N03/albums/72177720333835023/">
      ✦ Enter Bea's Flickr Gallery ✦
    </a>

    <div class="note">Redirecting in a few seconds...</div>
  </div>
</body>
</html>
