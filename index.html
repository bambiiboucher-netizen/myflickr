<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bea's Flickr</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="Bea's Flickr">
<meta property="og:description" content="Artwork • Photography • Second Life">
<meta property="og:type" content="website">

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: Georgia, "Times New Roman", serif;
    color: #eaffef;
    background:
      linear-gradient(rgba(0, 20, 12, 0.45), rgba(0, 0, 0, 0.72)),
      url("bea-bg.jpg");
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .card {
    width: min(90%, 560px);
    padding: 44px 34px;
    border-radius: 22px;
    background: rgba(0, 10, 5, 0.68);
    border: 1px solid rgba(139, 255, 177, 0.38);
    box-shadow: 0 0 45px rgba(74, 255, 140, 0.22);
    backdrop-filter: blur(8px);
  }

  h1 {
    margin: 0 0 14px;
    font-size: clamp(42px, 8vw, 72px);
    font-weight: normal;
    letter-spacing: 1px;
    text-shadow: 0 0 18px rgba(165, 255, 190, 0.55);
  }

  .subtitle {
    margin: 0 0 32px;
    font-family: Arial, sans-serif;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #b7ffc6;
  }

  a {
    display: inline-block;
    padding: 15px 34px;
    border-radius: 999px;
    border: 1px solid rgba(153, 255, 176, 0.7);
    color: #eaffef;
    text-decoration: none;
    font-family: Arial, sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: rgba(0, 40, 20, 0.5);
    box-shadow: 0 0 24px rgba(106, 255, 154, 0.25);
  }

  a:hover {
    background: rgba(76, 255, 136, 0.15);
    transform: translateY(-1px);
  }

  .note {
    margin-top: 24px;
    font-size: 15px;
    font-style: italic;
    opacity: 0.82;
  }
</style>

<script>
  setTimeout(function() {
    window.location.href = "https://www.flickr.com/photos/202234068@N03/albums/72177720333835023/";
  }, 10000);
</script>
</head>

<body>
  <div class="card">
    <h1>Bea's Flickr</h1>
    <div class="subtitle">Artwork • Photography • Second Life</div>

    <a href="https://www.flickr.com/photos/202234068@N03/albums/72177720333835023/">
      ✦ Enter Gallery ✦
    </a>

    <div class="note">Redirecting in a few seconds...</div>
  </div>
</body>
</html>
